<!doctypehtml>
<html>
	<head>
		<script>
			function go() {
				let url = '/'; //url
				maskedWindow = window.open();
				if (!maskedWindow || maskedWindow.closed) {
					alert("Please allow popup, this permission needed for cloaking the tab. it not contain any virus so plz allow it");
				}
				const doc = maskedWindow.document;
				doc.title = 'Classroom';
				var link = doc.createElement("link");
				link.rel="icon";
				link.href="https://gstatic.com/classroom/favicon.png";
				doc.head.appendChild(link);
				let embed = doc.createElement('embed');
				/*if (url.includes('https://') || url.includes('http://')) {
					embed.src = url;
				} else {
					embed.src = 'https://' + url;
				}*/
				embed.width = '100%';
				embed.height = '100%';
				embed.style.position = 'fixed';
				embed.style.top = '0';
				embed.style.left = '0';
				let script = document.createElement('script');
				script.innerHTML = `
    				window.onbeforeunload = function() {
                        return "reloading the site will end the aboutblank session. Are you sure you want to continue?";
                    };
                `;
				doc.body.appendChild(embed);
				doc.body.appendChild(script);
					window.location.href = 'https://classroom.google.com/';
				}
				window.onload = function() {
					go();
				}
        </script>
    </head>
</html>
